databases:
  - name: ollentra-db
    databaseName: ollentra
    user: ollentra
    region: frankfurt
    plan: free

services:
  # ── Production (branche main) ─────────────────────────────────────────────
  - type: web
    name: ollentra
    env: node
    region: frankfurt
    plan: free
    branch: main
    buildCommand: cd frontend && npm install && npm run build && cp dist/index.html dist/404.html && cd .. && cd backend && npm install
    startCommand: cd backend && node src/app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        value: ouangolo_super_secret_key_change_in_production_2024
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: DATABASE_URL
        fromDatabase:
          name: ollentra-db
          property: connectionString

  # ── UAT / Tests (branche uat) ─────────────────────────────────────────────
  - type: web
    name: ollentra-uat
    env: node
    region: frankfurt
    plan: free
    branch: uat
    buildCommand: cd frontend && npm install && npm run build && cp dist/index.html dist/404.html && cd .. && cd backend && npm install
    startCommand: cd backend && node src/app.js
    envVars:
      - key: NODE_ENV
        value: uat
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        value: ouangolo_uat_secret_key_2024
      - key: JWT_EXPIRES_IN
        value: 48h
      - key: DATABASE_URL
        fromDatabase:
          name: ollentra-db
          property: connectionString
